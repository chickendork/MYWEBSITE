<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gab's Website</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: url("meowl windows oboi.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    h1 {
      font-size: 4em;
      color: #ffffff;
      margin-bottom: 20px;
      text-shadow: 2px 2px 8px #000;
    }
    .cta {
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1.2em;
      color: #fff;
      background: #2c3e50;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .cta:hover {
      background: #34495e;
      transform: scale(1.1);
      box-shadow: 0 0 15px #fff;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .modal h2 {
      color: #ff4d6d;
      font-size: 3em;
      margin-bottom: 20px;
    }
    .photoRow {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin: 15px;
    }
    .photoRow img {
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 0 10px #fff;
    }
    .heart {
      position: absolute;
      color: #ff4d6d;
      font-size: 2em;
      animation: float 5s infinite, pulse 1s infinite;
      cursor: pointer;
    }
    @keyframes float {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }
    #scoreBoard {
      color: white;
      font-size: 1.5em;
      margin-top: 20px;
    }
    #musicToggle {
      margin-top: 15px;
      padding: 10px 20px;
      background: #27ae60;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    #musicToggle:hover {
      background: #2ecc71;
    }
  </style>
</head>
<body>
  <div id="mainContent">
    <h1>Gab's Website</h1>
    <a href="#" class="cta" onclick="showModal(event)">Explore More</a>
  </div>

  <div class="modal" id="sorryModal">
    <h2>I'm sorry</h2>
    <div class="photoRow">
      <img src="gN5E-zFk.jpg" alt="First picture">
      <img src="MdG4qpiN.jpg" alt="Second picture">
    </div>

    <div class="heart" style="left:20%;">❤</div>
    <div class="heart" style="left:40%;">❤</div>
    <div class="heart" style="left:60%;">❤</div>
    <div class="heart" style="left:80%;">❤</div>
    <div id="scoreBoard">Score: 0</div>
    <button id="musicToggle">Pause Music ⏸️</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    const messages = [
      "I'm sorry 💖",
      "Forgive me 🌸",
      "I love you ❤️",
      "Forever yours 💍",
      "You mean everything to me 💕",
      "My partner, my world 🌎"
    ];
    let score = 0;
    let musicPlaying = false;

    // Use the exact filename with spaces and symbols
    const audio = new Audio("@Usher - Hey Daddy (Daddy's Home) Lyrics.mp3");

    function showModal(event) {
      event.preventDefault();
      document.getElementById("mainContent").style.display = "none";
      document.getElementById("sorryModal").style.display = "flex";
      document.querySelector("#sorryModal h2").textContent = messages[Math.floor(Math.random()*messages.length)];

      confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

      score = 0;
      document.getElementById("scoreBoard").textContent = "Score: " + score;

      // Autoplay music
      audio.play();
      document.getElementById("musicToggle").textContent = "Pause Music ⏸️";
      musicPlaying = true;
    }

    document.querySelectorAll(".heart").forEach(heart => {
      heart.addEventListener("click", () => {
        score++;
        document.getElementById("scoreBoard").textContent = "Score: " + score;
        heart.style.display = "none";
      });
    });

    document.getElementById("musicToggle").addEventListener("click", () => {
      if (!musicPlaying) {
        audio.play();
        document.getElementById("musicToggle").textContent = "Pause Music ⏸️";
        musicPlaying = true;
      } else {
        audio.pause();
        document.getElementById("musicToggle").textContent = "Play Music 🎵";
        musicPlaying = false;
      }
    });
  </script>
</body>
</html>
